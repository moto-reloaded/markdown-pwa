<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1b2430">
    <title>MD Atelier</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand" aria-label="MD Atelier">
          <img src="./assets/icon.svg" alt="" width="32" height="32">
          <span>MD Atelier</span>
        </div>

        <nav class="toolbar" aria-label="Document actions">
          <button class="icon-button" id="newButton" type="button" title="新規" aria-label="新規">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
          </button>
          <button class="icon-button" id="openButton" type="button" title="開く" aria-label="開く">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5V6.8c0-1 .8-1.8 1.8-1.8h4.1l2 2h6.3c1 0 1.8.8 1.8 1.8v10.7H4Z"></path><path d="M4 19.5 6.2 11h15L19 19.5H4Z"></path></svg>
          </button>
          <button class="icon-button" id="saveButton" type="button" title="保存" aria-label="保存">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path><path d="M17 21v-8H7v8M7 3v5h8"></path></svg>
          </button>
          <button class="icon-button" id="downloadButton" type="button" title="Markdown をダウンロード" aria-label="Markdown をダウンロード">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
          </button>
          <button class="icon-button" id="htmlButton" type="button" title="HTML を出力" aria-label="HTML を出力">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 9-4 3 4 3"></path><path d="m16 9 4 3-4 3"></path><path d="m14 4-4 16"></path></svg>
          </button>
          <button class="icon-button" id="translateToggleButton" type="button" title="翻訳" aria-label="翻訳">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 8 6 6"></path><path d="m4 14 6-6 2-3"></path><path d="M2 5h12"></path><path d="M7 2h1"></path><path d="m22 22-5-10-5 10"></path><path d="M14 18h6"></path></svg>
          </button>
        </nav>

        <div class="view-switch" role="group" aria-label="View mode">
          <button class="mode-button is-active" data-mode="split" type="button">分割</button>
          <button class="mode-button" data-mode="edit" type="button">編集</button>
          <button class="mode-button" data-mode="preview" type="button">表示</button>
        </div>

        <div class="topbar-end">
          <button class="icon-button" id="helpButton" type="button" title="README を開く" aria-label="README を開く">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9.1 9a3 3 0 1 1 5.8 1c-.6 1.7-2.9 1.5-2.9 3.7"></path><path d="M12 17h.01"></path><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"></path></svg>
          </button>
          <button class="icon-button" id="themeButton" type="button" title="テーマ" aria-label="テーマ">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6.7 6.7 0 1 0 8.9 8.9A8 8 0 1 1 12 3Z"></path></svg>
          </button>
          <button class="install-button" id="installButton" type="button" hidden>Install</button>
        </div>
      </header>

      <section class="format-toolbar" aria-label="Markdown formatting">
        <div class="format-group" role="group" aria-label="Basic Markdown">
          <button class="format-button" data-command="bold" type="button" title="太字">B</button>
          <button class="format-button" data-command="italic" type="button" title="斜体">I</button>
          <button class="format-button" data-command="strike" type="button" title="取り消し線">S</button>
          <button class="format-button" data-command="inline-code" type="button" title="インラインコード">`</button>
          <button class="format-button" data-command="link" type="button" title="リンク">Link</button>
          <button class="format-button" data-command="image" type="button" title="画像">Img</button>
          <button class="format-button" data-command="h1" type="button" title="見出し1">H1</button>
          <button class="format-button" data-command="h2" type="button" title="見出し2">H2</button>
          <button class="format-button" data-command="h3" type="button" title="見出し3">H3</button>
          <button class="format-button" data-command="bullet-list" type="button" title="箇条書き">List</button>
          <button class="format-button" data-command="number-list" type="button" title="番号付きリスト">1.</button>
          <button class="format-button" data-command="check-list" type="button" title="チェックリスト">Check</button>
          <button class="format-button" data-command="quote" type="button" title="引用">Quote</button>
          <button class="format-button" data-command="code-block" type="button" title="コードブロック">Code</button>
          <button class="format-button" data-command="table" type="button" title="表">Table</button>
          <button class="format-button" data-command="hr" type="button" title="区切り線">HR</button>
        </div>

        <div class="format-group note-format-group" role="group" aria-label="note.com Markdown">
          <select id="markdownProfile" class="profile-select" aria-label="Markdown profile">
            <option value="standard">標準</option>
            <option value="note">note</option>
          </select>
          <button class="format-button" data-note-command="note-large-heading" type="button" title="note 大見出し">note大</button>
          <button class="format-button" data-note-command="note-small-heading" type="button" title="note 小見出し">note小</button>
          <button class="format-button" data-note-command="note-bold" type="button" title="note 太字">note太</button>
          <button class="format-button" data-note-command="note-quote" type="button" title="note 引用">note引</button>
          <button class="format-button" data-note-command="note-embed" type="button" title="note 埋め込みURL">Embed</button>
          <button class="format-button" data-note-command="note-math-inline" type="button" title="note インライン数式">Math</button>
          <button class="format-button" data-note-command="note-math-block" type="button" title="note 数式ブロック">$$</button>
        </div>
      </section>

      <section class="translation-panel" id="translationPanel" aria-label="Markdown translation" hidden>
        <div class="translation-controls">
          <label class="field-label" for="sourceLanguage">From</label>
          <select id="sourceLanguage" class="select-input">
            <option value="ja">日本語</option>
            <option value="en">English</option>
            <option value="zh-Hans">中文</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
          </select>

          <label class="field-label" for="targetLanguage">To</label>
          <select id="targetLanguage" class="select-input">
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="zh-Hans">中文</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
          </select>

          <button class="text-button" id="translateReplaceButton" type="button">置換</button>
          <button class="text-button" id="translateDownloadButton" type="button">翻訳版を保存</button>
        </div>
        <span class="translation-status" id="translationStatus">Translator API を確認中</span>
      </section>

      <main class="workspace split-mode" id="workspace">
        <section class="editor-pane" aria-label="Markdown editor">
          <div class="pane-header">
            <input id="documentTitle" class="title-input" aria-label="ファイル名" spellcheck="false" value="untitled.md">
            <span id="saveState" class="save-state">保存済み</span>
          </div>
          <textarea id="editor" class="editor" spellcheck="false" aria-label="Markdown"></textarea>
        </section>

        <section class="preview-pane" aria-label="Preview">
          <div class="pane-header preview-header">
            <span>Preview</span>
            <span id="documentStats" class="document-stats">0 words</span>
          </div>
          <article id="preview" class="markdown-body"></article>
        </section>
      </main>

      <footer class="statusbar" aria-live="polite">
        <span id="fileStatus">ローカル下書き</span>
        <span id="syncStatus">Offline ready</span>
      </footer>

      <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
